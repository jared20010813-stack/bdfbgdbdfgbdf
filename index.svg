<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position:fixed;inset:0;background:#18181b;">
  <foreignObject x="0" y="0" width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;padding:0;height:100vh;background:#18181b;color:white;font-family:'Press Start 2P',system-ui;overflow:auto;">
      
      <div style="max-width:1000px;margin:40px auto;padding:20px;text-align:center;">
        <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:40px;">
          <svg width="100" height="100" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="75" fill="#FFCC00"/>
            <circle cx="70" cy="80" r="18" fill="#111"/>
            <circle cx="130" cy="80" r="18" fill="#111"/>
            <circle cx="75" cy="75" r="8" fill="#fff"/>
            <circle cx="135" cy="75" r="8" fill="#fff"/>
            <path d="M65 130 Q100 160 135 130" fill="none" stroke="#111" stroke-width="15" stroke-linecap="round"/>
          </svg>
          <div>
            <h1 style="font-size:55px;color:#FFCC00;margin:0;">YOURDOGE</h1>
            <p style="color:#34D399;font-size:20px;">UNBLOCK • GAMES • HUB</p>
          </div>
        </div>

        <input id="url" placeholder="https://google.com" style="width:80%;padding:20px;font-size:20px;background:#27272a;border:4px solid #FFCC00;border-radius:9999px;color:white;outline:none;"/>
        
        <button onclick="go()" style="margin-top:20px;width:80%;padding:20px;font-size:24px;background:#FFCC00;color:black;border:none;border-radius:9999px;font-weight:bold;">
          GO →
        </button>

        <div style="margin-top:60px;">
          <button onclick="playGame()" style="padding:30px 80px;font-size:28px;background:#FFCC00;color:black;border:none;border-radius:9999px;font-weight:bold;">
            🚗 PLAY DRIVE MAD
          </button>
        </div>
      </div>

      <!-- Game Container -->
      <div id="game" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;">
        <button onclick="closeGame()" style="position:absolute;top:20px;right:20px;z-index:10000;padding:15px 30px;background:red;color:white;border:none;border-radius:10px;">✕ CLOSE</button>
        <iframe id="iframe" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
      </div>

      <script>
        function go() {
          let u = document.getElementById('url').value.trim();
          if (!u) return alert("Enter URL");
          if (!u.startsWith('http')) u = 'https://' + u;
          location.href = u;
        }

        function playGame() {
          document.getElementById('game').style.display = 'block';
          document.getElementById('iframe').src = 'https://drive-mad-unblock.github.io/';
        }

        function closeGame() {
          document.getElementById('iframe').src = '';
          document.getElementById('game').style.display = 'none';
        }
      </script>
    </body>
  </foreignObject>
</svg>
