<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position:fixed;inset:0;background:#18181b;">
  <foreignObject x="0" y="0" width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;padding:0;height:100vh;background:#18181b;color:white;font-family:'Press Start 2P',system-ui;overflow:auto;">
      
      <div style="max-width:1000px;margin:40px auto;padding:20px;text-align:center;">
        <div style="display:flex;align-items:center;justify-content:center;gap:25px;margin-bottom:50px;">
          <svg width="110" height="110" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="75" fill="#FFCC00"/>
            <circle cx="70" cy="80" r="18" fill="#111"/>
            <circle cx="130" cy="80" r="18" fill="#111"/>
            <circle cx="75" cy="75" r="8" fill="#fff"/>
            <circle cx="135" cy="75" r="8" fill="#fff"/>
            <path d="M65 130 Q100 160 135 130" fill="none" stroke="#111" stroke-width="15" stroke-linecap="round"/>
          </svg>
          <div>
            <h1 style="font-size:58px;color:#FFCC00;margin:0;">YOURDOGE</h1>
            <p style="color:#34D399;font-size:22px;">UNBLOCK • GAMES • HUB</p>
          </div>
        </div>

        <input id="urlInput" type="text" placeholder="https://google.com" 
               style="width:85%;max-width:700px;padding:25px;font-size:24px;background:#27272a;border:5px solid #FFCC00;border-radius:50px;color:white;outline:none;"/>

        <button onclick="proxyGo()" 
                style="margin-top:25px;width:85%;max-width:700px;padding:25px;font-size:28px;background:#FFCC00;color:black;border:none;border-radius:50px;font-weight:bold;">
          GO →
        </button>

        <div style="margin-top:80px;">
          <button onclick="loadDriveMad()" 
                  style="padding:40px 80px;font-size:32px;background:#FFCC00;color:black;border:none;border-radius:20px;font-weight:bold;">
            🚗 PLAY DRIVE MAD
          </button>
        </div>
      </div>

      <!-- Game Area -->
      <div id="gameContainer" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:10000;">
        <button onclick="closeGame()" style="position:absolute;top:20px;right:20px;padding:15px 30px;background:#ef4444;color:white;border:none;border-radius:10px;font-size:20px;z-index:10001;">✕ CLOSE GAME</button>
        <iframe id="gameFrame" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
      </div>

      <script>
        function proxyGo() {
          let url = document.getElementById('urlInput').value.trim();
          if (!url) return alert("Enter a URL!");
          if (!url.startsWith('http')) url = 'https://' + url;
          window.location.href = url;
        }

        function loadDriveMad() {
          document.getElementById('gameContainer').style.display = 'block';
          document.getElementById('gameFrame').src = "https://drive-mad-unblock.github.io/";
        }

        function closeGame() {
          document.getElementById('gameFrame').src = '';
          document.getElementById('gameContainer').style.display = 'none';
        }
      </script>
    </body>
  </foreignObject>
</svg>
