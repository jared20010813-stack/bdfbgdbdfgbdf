<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position:fixed;inset:0;background:#18181b;">
  <foreignObject x="0" y="0" width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;padding:0;height:100vh;background:#18181b;color:white;font-family:'Press Start 2P',system-ui;">
      
      <div style="max-width:1100px;margin:0 auto;padding:30px;text-align:center;">
        <!-- Header -->
        <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:40px;">
          <svg width="110" height="110" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="75" fill="#FFCC00"/>
            <circle cx="70" cy="80" r="18" fill="#111"/>
            <circle cx="130" cy="80" r="18" fill="#111"/>
            <circle cx="75" cy="75" r="8" fill="#fff"/>
            <circle cx="135" cy="75" r="8" fill="#fff"/>
            <path d="M65 130 Q100 160 135 130" fill="none" stroke="#111" stroke-width="15" stroke-linecap="round"/>
          </svg>
          <div>
            <h1 style="font-size:55px;color:#FFCC00;margin:0;">YOURDOGE</h1>
            <p style="color:#34D399;font-size:20px;">UNBLOCK • GAMES • HUB</p>
          </div>
        </div>

        <!-- Proxy -->
        <input id="urlInput" type="text" placeholder="https://google.com" 
               style="width:80%;max-width:700px;padding:25px;font-size:22px;background:#27272a;border:4px solid #FFCC00;border-radius:9999px;color:white;outline:none;"/>
        
        <button onclick="proxyGo()" 
                style="margin-top:20px;width:80%;max-width:700px;padding:22px;font-size:26px;background:#FFCC00;color:black;border:none;border-radius:9999px;font-weight:bold;">
          GO →
        </button>

        <!-- Game Button -->
        <div style="margin-top:60px;">
          <button onclick="loadDriveMad()" 
                  style="padding:35px 70px;font-size:28px;background:#FFCC00;color:black;border:none;border-radius:20px;font-weight:bold;">
            🚗 PLAY DRIVE MAD
          </button>
        </div>
      </div>

      <!-- Game Container -->
      <div id="gameContainer" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;">
        <button onclick="closeGame()" 
                style="position:absolute;top:15px;right:15px;padding:12px 25px;background:red;color:white;border:none;border-radius:8px;font-size:18px;z-index:10000;">
          ✕ CLOSE
        </button>
        <iframe id="gameFrame" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
      </div>

      <script>
        function proxyGo() {
          let url = document.getElementById('urlInput').value.trim();
          if (!url) return alert("Enter a URL!");
          if (!url.startsWith('http')) url = 'https://' + url;
          window.location.href = url;
        }

        function loadDriveMad() {
          document.getElementById('gameContainer').style.display = 'block';
          document.getElementById('gameFrame').src = "https://drive-mad-unblock.github.io/";
        }

        function closeGame() {
          document.getElementById('gameFrame').src = '';
          document.getElementById('gameContainer').style.display = 'none';
        }
      </script>

    </body>
  </foreignObject>
</svg>
