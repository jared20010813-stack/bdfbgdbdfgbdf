<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourDoge - Games</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/standalone@4.0.0/dist/tailwind.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; }
    .doge-yellow { color: #FFCC00; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <a href="index.html" class="text-yellow-400 hover:underline text-lg">← Home</a>
      <h1 class="text-4xl font-bold doge-yellow">🎮 YOURDOGE GAMES</h1>
      <button onclick="closeGame()" class="hidden" id="closeBtn">✕ Close Game</button>
    </div>

    <!-- Game Selection -->
    <div id="gameList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Games will be added here by JS -->
    </div>

    <!-- Game Frame -->
    <div id="gameFrame" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
      <div class="bg-zinc-900 p-4 flex justify-between items-center">
        <h2 id="gameTitle" class="text-xl font-bold doge-yellow"></h2>
        <button onclick="closeGame()" class="text-2xl hover:text-red-500">✕</button>
      </div>
      <iframe id="gameIframe" allowfullscreen></iframe>
    </div>
  </div>

  <script src="baremux/index.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/PeteZah-G/PeteStatic@main/scram/scramjet.all.js"></script>

  <script>
    const games = [
      { name: "Slope", url: "https://slope-game.github.io/" },
      { name: "1v1.LOL", url: "https://1v1.lol/" },
      { name: "Geometry Dash", url: "https://geometrydash.io/" },
      { name: "Krunker", url: "https://krunker.io/" },
      { name: "Shell Shockers", url: "https://shellshock.io/" },
      { name: "Paper.io", url: "https://papergames.io/" },
      { name: "Retro Bowl", url: "https://retrobowl.me/" },
      { name: "Hole.io", url: "https://hole-io.com/" },
      { name: "Tank Royale", url: "https://tankroyale.io/" },
      { name: "Zombs Royale", url: "https://zombsroyale.io/" },
      { name: "Vex 3", url: "https://vex3.io/" },
      { name: "Cookie Clicker", url: "https://cookieclicker.io/" }
    ];

    function loadGame(url, name) {
      document.getElementById('gameList').classList.add('hidden');
      const frameContainer = document.getElementById('gameFrame');
      frameContainer.classList.remove('hidden');
      document.getElementById('gameTitle').textContent = name;
      document.getElementById('closeBtn').classList.remove('hidden');

      const iframe = document.getElementById('gameIframe');
      
      // Load through Scramjet
      if (window.scramjet) {
        scramjet.loadConfig().then(() => {
          iframe.src = url;
        });
      } else {
        iframe.src = url;
      }
    }

    function closeGame() {
      const iframe = document.getElementById('gameIframe');
      iframe.src = '';
      document.getElementById('gameFrame').classList.add('hidden');
      document.getElementById('gameList').classList.remove('hidden');
      document.getElementById('closeBtn').classList.add('hidden');
    }
