<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourDoge - Drive Mad</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/standalone@4.0.0/dist/tailwind.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; }
    .doge-yellow { color: #FFCC00; }
    iframe { width: 100%; height: calc(100vh - 80px); border: none; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <a href="index.html" class="text-yellow-400 hover:underline">← Back to Home</a>
      <h1 class="text-4xl font-bold doge-yellow">🚗 DRIVE MAD</h1>
      <button onclick="closeGame()" class="px-6 py-3 bg-red-600 hover:bg-red-700 rounded-xl">✕ Close</button>
    </div>

    <div class="bg-black rounded-3xl overflow-hidden shadow-2xl">
      <iframe id="gameIframe" allowfullscreen></iframe>
    </div>
  </div>

  <script src="baremux/index.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/PeteZah-G/PeteStatic@main/scram/scramjet.all.js"></script>

  <script>
    async function loadDriveMad() {
      const url = "https://drive-mad-unblock.github.io/";   // Best working version right now
      
      const iframe = document.getElementById('gameIframe');
      
      try {
        if (window.scramjet) {
          await window.scramjet.loadConfig();
        }
        iframe.src = url;
      } catch(e) {
        iframe.src = url;
      }
    }

    function closeGame() {
      document.getElementById('gameIframe').src = '';
      window.location.href = "index.html";
    }

    // Load the game automatically
    window.onload = loadDriveMad;
  </script>
</body>
</html>
