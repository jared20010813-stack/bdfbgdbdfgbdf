<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 700" style="position:fixed;inset:0;background:#18181b;" xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- Background -->
  <rect width="1200" height="700" fill="#18181b"/>

  <!-- Doge Logo -->
  <circle cx="170" cy="110" r="75" fill="#FFCC00"/>
  <circle cx="130" cy="85" r="18" fill="#111"/>
  <circle cx="210" cy="85" r="18" fill="#111"/>
  <circle cx="135" cy="82" r="8" fill="#fff"/>
  <circle cx="215" cy="82" r="8" fill="#fff"/>
  <path d="M120 135 Q170 165 220 135" fill="none" stroke="#111" stroke-width="15" stroke-linecap="round"/>

  <!-- Title -->
  <text x="320" y="95" font-size="72" fill="#FFCC00" font-weight="bold" font-family="'Press Start 2P', sans-serif">YOURDOGE</text>
  <text x="320" y="135" font-size="24" fill="#34D399" font-family="'Press Start 2P', sans-serif">UNBLOCK • GAMES • HUB</text>

  <!-- Proxy Input (visual only) -->
  <rect x="200" y="220" width="620" height="85" rx="40" fill="#27272a" stroke="#FFCC00" stroke-width="12"/>
  <text x="250" y="275" font-size="28" fill="#666" font-family="'Press Start 2P', sans-serif">https://google.com</text>

  <!-- GO Button (clickable) -->
