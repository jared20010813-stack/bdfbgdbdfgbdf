<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Environment</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        #game-frame { width: 100vw; height: 100vh; border: none; display: none; }
        #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .spinner { border: 4px solid #333; border-top: 4px solid #ffcc00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status">Waiting for game selection...</p>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        const frame = document.getElementById('game-frame');
        const statusText = document.getElementById('status');
        const loader = document.getElementById('loader');

        // 1. REGISTER THE SERVICE WORKER (Crucial for Baremux/Proxy)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }

        // 2. LISTEN FOR THE SVG CLICK
        window.addEventListener('message', (event) => {
            // Verify the message is what we expect
            if (event.data && event.data.action === 'load_game') {
                console.log("Loading URL:", event.data.url);
                
                statusText.innerText = "Bypassing filters and loading game...";
                
                // Show the frame and hide the loader
                frame.style.display = "block";
                loader.style.display = "none";

                // Set the frame source
                // If using a proxy prefix, it would be: '/service/' + event.data.url
                frame.src = event.data.url; 
            }
        });

        // 3. AUTO-LOAD FROM URL PARAMS (If you refresh the page)
        const urlParams = new URLSearchParams(window.location.search);
        const autoUrl = urlParams.get('url');
        if (autoUrl) {
            frame.style.display = "block";
            loader.style.display = "none";
            frame.src = decodeURIComponent(autoUrl);
        }
    </script>
</body>
</html>
