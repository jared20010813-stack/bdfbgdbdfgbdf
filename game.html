<!DOCTYPE html>
<html>
<head>
    <title>Game Environment</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #game-frame { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>
    <iframe id="game-frame" src=""></iframe>

    <script>
        const frame = document.getElementById('game-frame');

        // 1. Handle initial load from URL parameter
        const params = new URLSearchParams(window.location.search);
        const initialUrl = params.get('url');
        if (initialUrl) {
            frame.src = initialUrl;
        }

        // 2. Handle clicks from your interactive SVG
        window.addEventListener('message', (event) => {
            if (event.data.action === 'load_game') {
                // This updates the iframe to Drive Mad
                frame.src = event.data.url;
                // Optional: Update browser URL without reloading
                window.history.pushState({}, '', `?url=${encodeURIComponent(event.data.url)}`);
            }
        });
    </script>
</body>
</html>
